<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PPK · Price Per Token · 主流大模型厂商价格聚合</title>
  <meta name="description" content="PPK (Price Per Token) 聚合 OpenAI、Anthropic、Google、DeepSeek、智谱、火山引擎等主流大模型厂商的 Token 价格、订阅制与 Coding Plan">
  <link rel="icon" type="image/svg+xml" href="icons/ppx.svg">
  <link rel="apple-touch-icon" href="icons/ppx.svg">
  <meta property="og:image" content="icons/ppx.svg">
  <meta property="og:title" content="PPK · Price Per Token">
  <meta property="og:description" content="主流大模型厂商价格聚合">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700&family=Geist+Mono:wght@400;500;600&family=Instrument+Serif:ital@0;1&family=Noto+Sans+SC:wght@400;500;600;700&family=Noto+Serif+SC:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css?v=13">
  <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
</head>
<body>
  <div id="app">

    <!-- ============ HEADER ============ -->
    <header class="header">
      <div class="header-inner">
        <a href="#/" class="brand">
          <img class="brand-mark" src="icons/ppx.svg" alt="PPK">
          <span class="brand-name">PPK</span>
          <span class="brand-tag">Price Per Token</span>
        </a>
        <nav class="nav-menu">
          <a href="#/" :class="{active: routeName === 'home'}">首页</a>
          <a href="#/billing/per_token" :class="{active: routeName === 'billing' && billingRoute === 'per_token'}">按需计费</a>
          <a href="#/billing/coding_plan" :class="{active: routeName === 'billing' && billingRoute === 'coding_plan'}">Coding Plan</a>
          <a href="#/billing/subscription" :class="{active: routeName === 'billing' && billingRoute === 'subscription'}">订阅制</a>
          <a href="#/about" :class="{active: routeName === 'about'}">关于</a>
        </nav>
        <div class="header-actions">
          <input
            class="search"
            v-model="searchQuery"
            placeholder="搜索厂商或模型..."
            v-if="routeName === 'compare' || routeName === 'billing' || routeName === 'provider'"
          />
          <a href="https://github.com/hangliuc/llm-price-compare" target="_blank" class="gh-link" aria-label="GitHub">
            <svg class="gh-icon" viewBox="0 0 16 16" width="18" height="18" aria-hidden="true">
              <path fill="currentColor" fill-rule="evenodd" d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.012 8.012 0 0016 8c0-4.42-3.58-8-8-8z"/>
            </svg>
          </a>
        </div>
      </div>
    </header>

    <!-- ============ LOADING ============ -->
    <div v-if="!data && !error" class="loading-state">加载中</div>

    <!-- ============ ERROR ============ -->
    <section v-if="error" class="error">
      <p>数据暂不可用：{{ error }}</p>
    </section>

    <!-- ============ 首页 ============ -->
    <template v-if="data && routeName === 'home'">
      <!-- 不对称 Hero -->
      <section class="hero">
        <div class="hero-left">
          <h1 class="hero-title">选大模型<br><em>从定价开始</em></h1>
          <p class="hero-sub">聚合 OpenAI、Anthropic、Google、AWS、DeepSeek、智谱等 12 家主流厂商的 Token 计费、订阅制与 Coding Plan，帮助开发者快速对比与选型</p>
          <div class="hero-cta">
            <a href="#/compare" class="btn btn-primary">查看价格对比 →</a>
            <a href="#/providers" class="btn btn-secondary">浏览厂商</a>
          </div>
        </div>
        <div class="hero-right">
          <div class="icon-orbit">
            <div class="orbit-ring orbit-ring-1"></div>
            <div class="orbit-ring orbit-ring-2"></div>
            <div class="orbit-ring orbit-ring-3"></div>
            <div class="orbit-core">
              <img class="brand-mark" src="icons/ppx.svg" alt="PPK">
            </div>
            <div
              v-for="(p, i) in allProvidersForOrbit"
              :key="p.id"
              class="orbit-icon"
              :style="orbitStyle(i, allProvidersForOrbit.length)"
            >
              <img :src="iconUrl(p.id)" :alt="p.name" @error="onIconError($event, p.id)">
            </div>
          </div>
        </div>
      </section>

      <!-- PPK 网站特征 -->
      <div class="billing-cards feature-cards">
        <div class="billing-card feature-card">
          <div class="billing-card-icon">
            <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7-10-7-10-7z"/>
              <circle cx="12" cy="12" r="3"/>
            </svg>
          </div>
          <div class="billing-card-body">
            <div class="billing-card-title">大模型价格一目了然</div>
            <div class="billing-card-desc">直观展示各家厂商 Token 定价，输入输出与缓存价格清晰可比</div>
          </div>
        </div>
        <div class="billing-card feature-card">
          <div class="billing-card-icon">
            <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <circle cx="12" cy="12" r="10"/>
              <path d="M2 12h20"/>
              <path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/>
            </svg>
          </div>
          <div class="billing-card-body">
            <div class="billing-card-title">聚合热门厂商</div>
            <div class="billing-card-desc">覆盖 OpenAI、Anthropic、Google、DeepSeek、智谱等国内外主流大模型厂商</div>
          </div>
        </div>
        <div class="billing-card feature-card">
          <div class="billing-card-icon">
            <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/>
              <path d="M3 3v5h5"/>
            </svg>
          </div>
          <div class="billing-card-body">
            <div class="billing-card-title">每日定时更新</div>
            <div class="billing-card-desc">每日自动同步官方最新定价，数据公开透明，支持 GitHub 订阅追踪</div>
          </div>
        </div>
      </div>

      <!-- 计费方式动态卡片 -->
      <section class="section billing-showcase">
        <div class="section-head">
          <div>
            <h2 class="section-title">三种<em>计费</em>方式</h2>
            <p class="section-sub">按需计费、订阅制、Coding Plan，总有一款适合你的使用场景</p>
          </div>
        </div>
        <div class="billing-showcase-grid">
          <a href="#/billing/per_token" class="billing-showcase-card" style="--card-delay: 0s">
            <div class="billing-showcase-inner">
              <div class="billing-showcase-icon">
                <svg viewBox="0 0 48 48" width="40" height="40" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M8 38l8-24 8 16 8-12 8 20"/>
                </svg>
              </div>
              <div class="billing-showcase-label">Per Token</div>
              <div class="billing-showcase-name">按需计费</div>
              <div class="billing-showcase-desc">按实际 Token 用量计费，输入输出分别定价，适合低频或弹性调用</div>
              <div class="billing-showcase-stat">
                <span class="stat-num">{{ perTokenCount }}</span>
                <span class="stat-unit">款产品</span>
              </div>
              <div class="billing-showcase-cta">查看价格 →</div>
            </div>
            <div class="billing-showcase-glow"></div>
          </a>

          <a href="#/billing/subscription" class="billing-showcase-card" style="--card-delay: 0.1s">
            <div class="billing-showcase-inner">
              <div class="billing-showcase-icon">
                <svg viewBox="0 0 48 48" width="40" height="40" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <rect x="8" y="14" width="32" height="24" rx="3"/>
                  <path d="M14 14v-4M34 14v-4M8 22h32"/>
                  <circle cx="16" cy="28" r="1.5" fill="currentColor"/>
                  <circle cx="24" cy="28" r="1.5" fill="currentColor"/>
                  <circle cx="32" cy="28" r="1.5" fill="currentColor"/>
                </svg>
              </div>
              <div class="billing-showcase-label">Subscription</div>
              <div class="billing-showcase-name">订阅制</div>
              <div class="billing-showcase-desc">面向终端用户的产品订阅，固定月费换不限量使用，代表 ChatGPT Plus、Claude Pro</div>
              <div class="billing-showcase-stat">
                <span class="stat-num">{{ subscriptionCount }}</span>
                <span class="stat-unit">款产品</span>
              </div>
              <div class="billing-showcase-cta">查看套餐 →</div>
            </div>
            <div class="billing-showcase-glow"></div>
          </a>

          <a href="#/billing/coding_plan" class="billing-showcase-card" style="--card-delay: 0.2s">
            <div class="billing-showcase-inner">
              <div class="billing-showcase-icon">
                <svg viewBox="0 0 48 48" width="40" height="40" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <polyline points="16 18 8 26 16 34"/>
                  <polyline points="32 18 40 26 32 34"/>
                  <line x1="28" y1="14" x2="20" y2="38"/>
                </svg>
              </div>
              <div class="billing-showcase-label">Coding Plan</div>
              <div class="billing-showcase-name">编程套餐</div>
              <div class="billing-showcase-desc">面向开发者的 API 额度套餐，月付换 Token 池，代表 GLM Coding、方舟 Coding Plan</div>
              <div class="billing-showcase-stat">
                <span class="stat-num">{{ codingPlanCount }}</span>
                <span class="stat-unit">款产品</span>
              </div>
              <div class="billing-showcase-cta">查看套餐 →</div>
            </div>
            <div class="billing-showcase-glow"></div>
          </a>
        </div>
      </section>

      <!-- 厂商速览 -->
      <section class="section">
        <div class="section-head">
          <div>
            <h2 class="section-title">主流大模型<span class="title-normal">厂商</span></h2>
            <p class="section-sub">覆盖国内外 {{ providerList.length }} 家主流大模型厂商，点击查看完整产品线与定价</p>
          </div>
          <a href="#/providers" class="section-link">厂商总览 -></a>
        </div>
        <div class="providers-grid providers-grid-home">
          <div v-for="p in providerList" :key="p.id" class="provider-card" @click="goHash('#/provider/' + p.id)">
            <div class="provider-card-head">
              <span class="provider-card-icon">
                <img :src="iconUrl(p.id)" :alt="p.name" @error="onIconError($event, p.id)">
              </span>
              <div class="provider-card-info">
                <div class="provider-card-name">{{ p.name }}</div>
                <span class="region-badge" :class="p.region">{{ p.region === 'cn' ? '国内' : (p.region === 'us' ? '美国' : '欧洲') }}</span>
              </div>
              <span class="provider-card-status-badge" :class="p.statusOk ? 'ok' : 'fail'">
                <span class="status-dot" :class="p.statusOk ? 'ok' : 'fail'"></span>
                {{ p.statusOk ? '正常' : p.statusText }}
              </span>
            </div>
            <div class="provider-card-meta">
              <span class="provider-card-count">{{ p.productCount }}<span class="count-unit"> 款产品</span></span>
              <a :href="p.website" target="_blank" @click.stop class="provider-card-site">官网 ↗</a>
            </div>
          </div>
        </div>
      </section>

      <!-- FAQ + 社群 -->
      <section class="section faq-community" style="padding-top: 0;">
        <div class="faq-community-grid">
          <!-- FAQ -->
          <div class="faq-block">
            <h2 class="section-title">常见问题</h2>
            <div class="faq-list">
              <details class="faq-item">
                <summary>什么是按需计费、订阅制、Coding Plan？</summary>
                <div class="faq-answer">
                  <p><b>按需计费（Per Token）</b>：按实际使用的 Token 数量计费，输入和输出分别定价，通过 API 调用，适合低频或弹性场景。</p>
                  <p><b>订阅制（Subscription）</b>：面向终端用户的产品订阅，固定月费换取额度内不限量使用，直接在厂商产品（如 ChatGPT Plus、Claude Pro、Cursor Pro）内消费，无需 API 接入。</p>
                  <p><b>Coding Plan</b>：面向开发者的 API 额度套餐，月付固定费用换取 Token 额度池，通过 API 接入编程工具（如 Claude Code、GLM Coding、方舟 Coding Plan）按调用扣减，适合日常编程。</p>
                </div>
              </details>
              <details class="faq-item">
                <summary>这里的价格数据多久更新一次？准确吗？</summary>
                <div class="faq-answer">
                  <p>数据每日北京时间 11:00 通过 Python 爬虫自动抓取各家厂商官网定价页，经三源交叉验证（LiteLLM JSON + OpenRouter API + 官网 Scraper）后落盘。</p>
                  <p>每家厂商独立状态标记（正常 / 失败 / 过期），失败时回退至上次成功数据并标注「可能过期」。价格异常波动 &gt;20% 警告、&gt;50% 阻断，确保数据可信。</p>
                </div>
              </details>
              <details class="faq-item">
                <summary>什么是输入（Input）、输出（Output）与缓存读取（Cache Read）？</summary>
                <div class="faq-answer">
                  <p><b>输入（Input）</b>：你发送给模型的 Prompt（含系统提示、上下文、问题）按 Token 计费。</p>
                  <p><b>输出（Output）</b>：模型生成的回复按 Token 计费，通常比输入贵 3-4 倍。</p>
                  <p><b>缓存读取（Cache Read）</b>：部分厂商（如 Anthropic、DeepSeek）支持 Prompt 缓存，重复使用的上下文以更低价格计费（通常为输入价的 10%-50%），可大幅降低长上下文场景成本。</p>
                </div>
              </details>
              <details class="faq-item">
                <summary>如果我发现价格有误，或者想新增其他厂商怎么办？</summary>
                <div class="faq-answer">
                  <p>欢迎通过 <a :href="feedbackUrl" target="_blank">GitHub Issues</a> 反馈，提供预填模板选择「价格异常报告」或「新增厂商建议」。</p>
                  <p>也可以通过下方社群二维码加入我们的飞书群，直接与维护者沟通。</p>
                </div>
              </details>
            </div>
          </div>

          <!-- 社群 -->
          <div class="community-block">
            <h2 class="section-title">加入社群</h2>
            <p class="section-sub">与开发者交流大模型选型经验，第一时间获取价格变动通知</p>
            <div class="community-card">
              <img src="image/feishu-qr.png" alt="飞书社群二维码" class="qr-img">
              <div class="community-info">
                <div class="community-name">飞书用户交流群</div>
                <div class="community-desc">扫码加入 · 实时价格提醒 · 选型讨论</div>
                <a href="https://app.feishu.cn/" target="_blank" class="community-link">没有飞书？下载 →</a>
              </div>
            </div>
          </div>
        </div>
      </section>
    </template>

    <!-- ============ 厂商总览 ============ -->
    <template v-if="data && routeName === 'providers'">
      <section class="section section-page">
        <div class="section-head">
          <div>
            <div class="section-eyebrow">全部厂商</div>
            <h1 class="section-title">厂商<em>总览</em></h1>
            <p class="section-sub">主流大模型厂商一览，点击卡片进入价格对比</p>
          </div>
        </div>
        <div class="freshness">
          <span>最近更新 <b>{{ freshnessText }}</b></span>
          <span class="freshness-sep">·</span>
          <span><b>{{ data.providers.length }}</b> 家厂商</span>
          <span class="stale-warning" v-if="staleCount > 0">{{ staleCount }} 家数据可能过期</span>
        </div>
        <div class="providers-grid">
          <div v-for="p in providerList" :key="p.id" class="provider-card" @click="goHash('#/provider/' + p.id)">
            <div class="provider-card-head">
              <span class="provider-card-icon">
                <img :src="iconUrl(p.id)" :alt="p.name" @error="onIconError($event, p.id)">
              </span>
              <div>
                <div class="provider-card-name">{{ p.name }}</div>
                <div class="provider-card-region">{{ p.region === 'cn' ? '国内' : (p.region === 'us' ? '美国' : '欧洲') }}</div>
              </div>
            </div>
            <div class="provider-card-meta">
              <span>{{ p.productCount }} 个产品</span>
              <a :href="p.website" target="_blank" @click.stop>官网 ↗</a>
            </div>
            <div class="provider-card-status">
              <span class="status-dot" :class="p.statusOk ? 'ok' : 'fail'"></span>
              <span :style="{color: p.statusOk ? 'var(--green)' : 'var(--amber)'}">{{ p.statusOk ? '数据正常' : p.statusText }}</span>
            </div>
          </div>
        </div>
      </section>
    </template>

    <!-- ============ 价格对比 / 计费类型页 / 厂商详情页 ============ -->
    <template v-if="data && (routeName === 'compare' || routeName === 'billing' || routeName === 'provider')">
      <section class="section section-page">
        <div class="section-head">
          <div>
            <div class="section-eyebrow" v-if="routeName === 'compare'">全部产品</div>
            <h1 class="section-title" v-if="routeName === 'compare'">价格<em>对比</em></h1>
            <p class="section-sub" v-if="routeName === 'compare'">所有厂商产品价格一览，支持筛选与排序</p>

            <div class="section-eyebrow" v-if="routeName === 'billing' && billingRoute === 'per_token'">Token 计费</div>
            <h1 class="section-title" v-if="routeName === 'billing' && billingRoute === 'per_token'">按需<em>计费</em></h1>
            <p class="section-sub" v-if="routeName === 'billing' && billingRoute === 'per_token'">按实际 Token 用量计费，适合低频或弹性调用</p>

            <div class="section-eyebrow" v-if="routeName === 'billing' && billingRoute === 'subscription'">周期订阅</div>
            <h1 class="section-title" v-if="routeName === 'billing' && billingRoute === 'subscription'">订阅<em>制</em></h1>
            <p class="section-sub" v-if="routeName === 'billing' && billingRoute === 'subscription'">面向终端用户的产品订阅：固定月费换取额度内不限量使用，直接在厂商产品（ChatGPT、Claude.ai、Cursor）内消费，无需 API 接入</p>

            <div class="section-eyebrow" v-if="routeName === 'billing' && billingRoute === 'coding_plan'">编程套餐</div>
            <h1 class="section-title" v-if="routeName === 'billing' && billingRoute === 'coding_plan'">Coding <em>Plan</em></h1>
            <p class="section-sub" v-if="routeName === 'billing' && billingRoute === 'coding_plan'">面向开发者的 API 额度套餐：月付固定费用换取 Token 额度池，通过 API 接入 Claude Code、GLM Coding、方舟等编程工具，按调用扣减</p>

            <div class="section-eyebrow" v-if="routeName === 'provider' && currentProvider">厂商产品</div>
            <h1 class="section-title" v-if="routeName === 'provider' && currentProvider">{{ currentProvider.name }}<em> 全部产品</em></h1>
            <p class="section-sub" v-if="routeName === 'provider' && currentProvider">{{ currentProvider.name_en || currentProvider.name }} 的全部计费方式产品，含按需计费、订阅制与 Coding Plan</p>
          </div>
          <a v-if="routeName === 'provider'" href="#/providers" class="section-link">← 返回全部厂商</a>
        </div>

        <div class="filters">
          <div class="filter-group">
            <span class="filter-label">厂商</span>
            <button v-for="p in providerFilterList" :key="p.id" @click="toggleFilter('provider', p.id)"
              :class="['chip', {active: filters.provider.includes(p.id)}]">{{ p.name }}</button>
          </div>
          <div class="filter-group" v-if="routeName !== 'billing'">
            <span class="filter-label">计费</span>
            <button v-for="b in billingTypes" :key="b" @click="toggleFilter('billing', b)"
              :class="['chip', {active: filters.billing.includes(b)}]">{{ billingLabel(b) }}</button>
          </div>
          <div class="filter-group" v-if="routeName !== 'billing'">
            <span class="filter-label">类型</span>
            <button v-for="m in modalities" :key="m" @click="toggleFilter('modality', m)"
              :class="['chip', {active: filters.modality.includes(m)}]">{{ m }}</button>
          </div>
        </div>

        <div class="freshness">
          <span>最近更新 <b>{{ freshnessText }}</b></span>
          <span class="freshness-sep">·</span>
          <span><b>{{ filteredRows.length }}</b> 个产品</span>
          <span class="stale-warning" v-if="staleCount > 0">{{ staleCount }} 家数据可能过期</span>
        </div>

        <div class="view-toggle">
          <div>
            <button :class="{active: view === 'table'}" @click="view = 'table'">表格</button>
            <button :class="{active: view === 'card'}" @click="view = 'card'">卡片</button>
          </div>
          <div class="currency-toggle">
            <button :class="{active: displayCurrency === 'CNY'}" @click="displayCurrency = 'CNY'">¥ CNY</button>
            <button :class="{active: displayCurrency === 'USD'}" @click="displayCurrency = 'USD'">$ USD</button>
          </div>
        </div>

        <div class="table-wrap" v-show="view === 'table'">
          <!-- 按需计费表（8 列） -->
          <table class="price-table" v-if="billingRoute === 'per_token' || routeName === 'compare' || routeName === 'provider'">
            <colgroup>
              <col style="width: 11%">
              <col style="width: 22%">
              <col style="width: 14%">
              <col style="width: 12%">
              <col style="width: 12%">
              <col style="width: 11%">
              <col style="width: 9%">
              <col style="width: 9%">
            </colgroup>
            <thead>
              <tr>
                <th class="sortable" @click="sortBy('providerName')" :class="{'sort-asc': sortKey === 'providerName' && sortAsc, 'sort-desc': sortKey === 'providerName' && !sortAsc}">厂商</th>
                <th class="sortable" @click="sortBy('model')" :class="{'sort-asc': sortKey === 'model' && sortAsc, 'sort-desc': sortKey === 'model' && !sortAsc}">模型</th>
                <th class="sortable" @click="sortBy('modalities')" :class="{'sort-asc': sortKey === 'modalities' && sortAsc, 'sort-desc': sortKey === 'modalities' && !sortAsc}">类型</th>
                <th class="sortable" @click="sortBy('inputPrice')" :class="{'sort-asc': sortKey === 'inputPrice' && sortAsc, 'sort-desc': sortKey === 'inputPrice' && !sortAsc}" style="text-align:right">输入价<span class="th-unit">/1M</span></th>
                <th class="sortable" @click="sortBy('outputPrice')" :class="{'sort-asc': sortKey === 'outputPrice' && sortAsc, 'sort-desc': sortKey === 'outputPrice' && !sortAsc}" style="text-align:right">输出价<span class="th-unit">/1M</span></th>
                <th class="sortable" @click="sortBy('cachedInput')" :class="{'sort-asc': sortKey === 'cachedInput' && sortAsc, 'sort-desc': sortKey === 'cachedInput' && !sortAsc}" style="text-align:right">缓存命中<span class="th-unit">/1M</span></th>
                <th class="sortable" @click="sortBy('contextWindow')" :class="{'sort-asc': sortKey === 'contextWindow' && sortAsc, 'sort-desc': sortKey === 'contextWindow' && !sortAsc}" style="text-align:right">上下文</th>
                <th>购买</th>
              </tr>
            </thead>
            <tbody>
              <tr v-for="row in filteredRows" :key="row.id" @click="toggleExpand(row.id)"
                :class="{stale: row.stale, expanded: expanded === row.id}">
                <td>
                  <div class="provider-cell">
                    <span class="provider-icon">
                      <img :src="iconUrl(row.providerId)" :alt="row.providerName" @error="onIconError($event, row.providerId)">
                    </span>
                    {{ row.providerName }}
                  </div>
                </td>
                <td class="mono">{{ row.model || '—' }}</td>
                <td class="modalities-cell">{{ (row.modalities || []).join(', ') || '—' }}</td>
                <td class="num">{{ formatPrice(row, 'input') }}</td>
                <td class="num">{{ formatPrice(row, 'output') }}</td>
                <td class="num">{{ formatPrice(row, 'cached_input') }}</td>
                <td class="num">{{ formatContext(row.context_window) }}</td>
                <td><a :href="row.purchase_url" target="_blank" @click.stop>购买</a></td>
              </tr>
              <tr v-if="expanded && currentRow" class="detail-row">
                <td colspan="8">
                  <div class="detail">
                    <p v-if="benchmarkText(currentRow)">能力评分: {{ benchmarkText(currentRow) }}</p>
                    <p v-if="currentRow.stale" class="stale-detail">数据来自 {{ staleHours(currentRow) }} 小时前，可能过期</p>
                  </div>
                </td>
              </tr>
            </tbody>
          </table>

          <!-- Coding Plan / 订阅制表（5 列） -->
          <table class="price-table" v-else>
            <colgroup>
              <col style="width: 14%">
              <col style="width: 26%">
              <col style="width: 14%">
              <col style="width: 22%">
              <col style="width: 10%">
            </colgroup>
            <thead>
              <tr>
                <th class="sortable" @click="sortBy('providerName')" :class="{'sort-asc': sortKey === 'providerName' && sortAsc, 'sort-desc': sortKey === 'providerName' && !sortAsc}">厂商</th>
                <th class="sortable" @click="sortBy('model')" :class="{'sort-asc': sortKey === 'model' && sortAsc, 'sort-desc': sortKey === 'model' && !sortAsc}">套餐</th>
                <th class="sortable" @click="sortBy('monthlyPrice')" :class="{'sort-asc': sortKey === 'monthlyPrice' && sortAsc, 'sort-desc': sortKey === 'monthlyPrice' && !sortAsc}" style="text-align:right">月费</th>
                <th>额度</th>
                <th>购买</th>
              </tr>
            </thead>
            <tbody>
              <tr v-for="row in filteredRows" :key="row.id" @click="toggleExpand(row.id)"
                :class="{stale: row.stale, expanded: expanded === row.id}">
                <td>
                  <div class="provider-cell">
                    <span class="provider-icon">
                      <img :src="iconUrl(row.providerId)" :alt="row.providerName" @error="onIconError($event, row.providerId)">
                    </span>
                    {{ row.providerName }}
                  </div>
                </td>
                <td class="mono">{{ row.model || '—' }}</td>
                <td class="num">{{ formatMonthly(row) }}</td>
                <td>{{ formatQuota(row) }}</td>
                <td><a :href="row.purchase_url" target="_blank" @click.stop>购买</a></td>
              </tr>
              <tr v-if="expanded && currentRow" class="detail-row">
                <td colspan="5">
                  <div class="detail">
                    <div v-if="(currentRow.prices?.features || []).length" class="detail-features">
                      <p class="detail-features-title">套餐功能</p>
                      <ul>
                        <li v-for="(f, i) in currentRow.prices.features" :key="i">{{ f }}</li>
                      </ul>
                    </div>
                    <p v-if="currentRow.stale" class="stale-detail">数据来自 {{ staleHours(currentRow) }} 小时前，可能过期</p>
                  </div>
                </td>
              </tr>
            </tbody>
          </table>
        </div>

        <!-- billing 路由（coding_plan/subscription）：按厂商分组的卡片 -->
        <div class="provider-card-grid" v-if="routeName === 'billing' && view === 'card'">
          <div v-for="g in groupedRows" :key="g.providerId" class="provider-plan-card" :class="{stale: g.stale}">
            <div class="provider-plan-header">
              <div class="provider-plan-id">
                <span class="provider-icon">
                  <img :src="iconUrl(g.providerId)" :alt="g.providerName" @error="onIconError($event, g.providerId)">
                </span>
                <div>
                  <div class="provider-plan-name">{{ g.providerName }}</div>
                  <div class="provider-plan-count">{{ g.products.length }} 个套餐</div>
                </div>
              </div>
              <span class="region-badge" :class="g.region">{{ g.region === 'cn' ? '国内' : (g.region === 'us' ? '美国' : '欧洲') }}</span>
            </div>
            <div class="provider-plan-list">
              <div v-for="p in g.products" :key="p.id" class="plan-item" @click="toggleExpand(p.id)" :class="{expanded: expanded === p.id}">
                <div class="plan-item-head">
                  <div class="plan-item-name">{{ p.model || '—' }}</div>
                  <div class="plan-item-price">{{ formatMonthly(p) }}<span class="plan-item-period">/月</span></div>
                </div>
                <div class="plan-item-quota">{{ formatQuota(p) }}</div>
                <div v-if="p.prices.first_month_price" class="plan-item-promo">首月 {{ formatPrice(p, 'first_month_price') }}</div>
                <div v-if="expanded === p.id && (p.prices.features || []).length" class="plan-item-features">
                  <ul>
                    <li v-for="(f, i) in p.prices.features" :key="i">{{ f }}</li>
                  </ul>
                </div>
                <a class="plan-item-buy" :href="p.purchase_url" target="_blank" @click.stop>购买 →</a>
              </div>
            </div>
          </div>
        </div>

        <!-- 其它路由：按产品的卡片 -->
        <div class="card-grid" v-if="routeName !== 'billing' && view === 'card'">
          <div v-for="row in filteredRows" :key="row.id" class="card" :class="{stale: row.stale}">
            <div class="card-header">
              <div class="card-provider-wrap">
                <span class="provider-icon">
                  <img :src="iconUrl(row.providerId)" :alt="row.providerName" @error="onIconError($event, row.providerId)">
                </span>
                <span class="card-provider">{{ row.providerName }}</span>
              </div>
              <span class="card-billing">{{ billingLabel(row.billing_type) }}</span>
            </div>
            <div class="card-model">{{ row.model || '—' }}</div>
            <div class="card-meta-row" v-if="row.billing_type === 'per_token'">
              <span class="card-mods">{{ (row.modalities || []).join(', ') || '—' }}</span>
              <span class="card-ctx">{{ formatContext(row.context_window) }}</span>
            </div>
            <div class="card-prices" v-if="row.billing_type === 'per_token'">
              <div v-if="row.prices.input"><span>输入<span class="price-unit">/1M</span></span><span>{{ formatPrice(row, 'input') }}</span></div>
              <div v-if="row.prices.output"><span>输出<span class="price-unit">/1M</span></span><span>{{ formatPrice(row, 'output') }}</span></div>
              <div v-if="row.prices.cached_input"><span>缓存<span class="price-unit">/1M</span></span><span>{{ formatPrice(row, 'cached_input') }}</span></div>
            </div>
            <div class="card-prices" v-else>
              <div v-if="row.prices.monthly_price != null"><span>月费</span><span>{{ formatMonthly(row) }}</span></div>
              <div><span>额度</span><span>{{ formatQuota(row) }}</span></div>
            </div>
            <a class="card-buy" :href="row.purchase_url" target="_blank">购买 →</a>
          </div>
        </div>
      </section>
    </template>

    <!-- ============ 关于 ============ -->
    <template v-if="data && routeName === 'about'">
      <section class="section section-page">
        <div class="section-head">
          <div>
            <div class="section-eyebrow">关于本项目</div>
            <h1 class="section-title">关于</h1>
            <p class="section-sub">非商业的大模型价格聚合工具</p>
          </div>
        </div>
        <div class="about-page">
          <p>PPK (Price Per Token) 帮助开发者快速对比各主流厂商的 Token 价格、订阅制和 Coding Plan。数据通过 Python 爬虫定时抓取各厂商公开定价页面，经校验后生成静态 JSON，由前端实时渲染。单个厂商抓取失败不影响其他厂商数据展示。</p>

          <h2>数据<em>来源</em></h2>
          <ul>
            <li>OpenAI</li>
            <li>Anthropic</li>
            <li>Google</li>
            <li>DeepSeek</li>
            <li>智谱</li>
            <li>火山引擎</li>
            <li>OpenCode</li>
            <li>通义千问</li>
            <li>Kimi</li>
            <li>AWS</li>
            <li>MiniMax</li>
            <li>小米</li>
          </ul>

          <h2>技术<em>栈</em></h2>
          <ul>
            <li>后端：Python 爬虫 + Playwright</li>
            <li>前端：Vue 3 CDN（无构建步骤）</li>
            <li>部署：Docker + Cron + GitHub Pages</li>
          </ul>

          <h2>反馈</h2>
          <p>如发现价格错误或有新厂商建议，请通过 <a :href="feedbackUrl" target="_blank">GitHub Issues</a> 反馈。</p>
        </div>
      </section>
    </template>

    <!-- ============ FOOTER ============ -->
    <footer class="footer">
      <div class="footer-inner">
        <div class="footer-brand">
          <img class="brand-mark" src="icons/ppx.svg" alt="PPK">
          <span class="brand-name">PPK</span>
          <span class="brand-tag">Price Per Token</span>
        </div>
        <div class="footer-meta">
          数据仅供参考 · 价格以厂商官方为准 ·
          <a href="https://github.com/hangliuc/llm-price-compare" target="_blank">GitHub</a>
        </div>
      </div>
    </footer>
  </div>

  <script src="app.js?v=13"></script>
</body>
</html>
