<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PPK · Price Per Token · 主流大模型厂商价格聚合</title>
  <meta name="description" content="PPK (Price Per Token) 聚合 OpenAI、Anthropic、Google、DeepSeek、智谱、火山引擎等主流大模型厂商的 Token 价格、订阅制与 Coding Plan">
  <link rel="icon" type="image/svg+xml" href="icons/ppx.svg">
  <link rel="apple-touch-icon" href="icons/ppx.svg">
  <meta property="og:image" content="icons/ppx.svg">
  <meta property="og:title" content="PPK · Price Per Token">
  <meta property="og:description" content="主流大模型厂商价格聚合">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700&family=Geist+Mono:wght@400;500;600&family=Instrument+Serif:ital@0;1&family=Noto+Sans+SC:wght@400;500;600;700&family=Noto+Serif+SC:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
</head>
<body>
  <div id="app">

    <!-- ============ HEADER ============ -->
    <header class="header">
      <div class="header-inner">
        <a href="#/" class="brand">
          <img class="brand-mark" src="icons/ppx.svg" alt="PPK">
          <span class="brand-name">PPK</span>
          <span class="brand-tag">Price Per Token</span>
        </a>
        <nav class="nav-menu">
          <a href="#/" :class="{active: routeName === 'home'}">首页</a>
          <a href="#/billing/per_token" :class="{active: routeName === 'billing' && billingRoute === 'per_token'}">按需计费</a>
          <a href="#/billing/coding_plan" :class="{active: routeName === 'billing' && billingRoute === 'coding_plan'}">Coding Plan</a>
          <a href="#/billing/subscription" :class="{active: routeName === 'billing' && billingRoute === 'subscription'}">订阅制</a>
          <a href="#/about" :class="{active: routeName === 'about'}">关于</a>
        </nav>
        <div class="header-actions">
          <input
            class="search"
            v-model="searchQuery"
            placeholder="搜索厂商或模型..."
            v-if="routeName !== 'providers' && routeName !== 'about'"
          />
          <a href="https://github.com/hangliuc/llm-price-compare" target="_blank" class="gh-link" aria-label="GitHub">
            <svg class="gh-icon" viewBox="0 0 16 16" width="18" height="18" aria-hidden="true">
              <path fill="currentColor" fill-rule="evenodd" d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.012 8.012 0 0016 8c0-4.42-3.58-8-8-8z"/>
            </svg>
          </a>
        </div>
      </div>
    </header>

    <!-- ============ LOADING ============ -->
    <div v-if="!data && !error" class="loading-state">加载中</div>

    <!-- ============ ERROR ============ -->
    <section v-if="error" class="error">
      <p>数据暂不可用：{{ error }}</p>
    </section>

    <!-- ============ 首页 ============ -->
    <template v-if="data && routeName === 'home'">
      <!-- 不对称 Hero -->
      <section class="hero">
        <div class="hero-left">
          <h1 class="hero-title">选大模型<br><em>从定价开始</em></h1>
          <p class="hero-sub">聚合 OpenAI、Anthropic、Google、AWS、DeepSeek、智谱等 12 家主流厂商的 Token 计费、订阅制与 Coding Plan，帮助开发者快速对比与选型</p>
          <div class="hero-cta">
            <a href="#/compare" class="btn btn-primary">查看价格对比 →</a>
            <a href="#/providers" class="btn btn-secondary">浏览厂商</a>
          </div>
        </div>
        <div class="hero-right">
          <div class="icon-orbit">
            <div class="orbit-ring orbit-ring-1"></div>
            <div class="orbit-ring orbit-ring-2"></div>
            <div class="orbit-ring orbit-ring-3"></div>
            <div class="orbit-core">
              <img class="brand-mark" src="icons/ppx.svg" alt="PPK">
            </div>
            <div
              v-for="(p, i) in allProvidersForOrbit"
              :key="p.id"
              class="orbit-icon"
              :style="orbitStyle(i, allProvidersForOrbit.length)"
            >
              <img :src="iconUrl(p.id)" :alt="p.name" @error="onIconError($event, p.id)">
            </div>
          </div>
        </div>
      </section>

      <!-- PPK 网站特征 -->
      <div class="billing-cards feature-cards">
        <div class="billing-card feature-card">
          <div class="billing-card-icon">
            <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7-10-7-10-7z"/>
              <circle cx="12" cy="12" r="3"/>
            </svg>
          </div>
          <div class="billing-card-body">
            <div class="billing-card-title">大模型价格一目了然</div>
            <div class="billing-card-desc">直观展示各家厂商 Token 定价，输入输出与缓存价格清晰可比</div>
          </div>
        </div>
        <div class="billing-card feature-card">
          <div class="billing-card-icon">
            <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <circle cx="12" cy="12" r="10"/>
              <path d="M2 12h20"/>
              <path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/>
            </svg>
          </div>
          <div class="billing-card-body">
            <div class="billing-card-title">聚合热门厂商</div>
            <div class="billing-card-desc">覆盖 OpenAI、Anthropic、Google、DeepSeek、智谱等国内外主流大模型厂商</div>
          </div>
        </div>
        <div class="billing-card feature-card">
          <div class="billing-card-icon">
            <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/>
              <path d="M3 3v5h5"/>
            </svg>
          </div>
          <div class="billing-card-body">
            <div class="billing-card-title">每日定时更新</div>
            <div class="billing-card-desc">每日自动同步官方最新定价，数据公开透明，支持 GitHub 订阅追踪</div>
          </div>
        </div>
      </div>

      <!-- 厂商速览 -->
      <section class="section">
        <div class="section-head">
          <div>
            <div class="section-eyebrow">厂商速览</div>
            <h2 class="section-title">主流大模型<span class="title-normal">厂商</span></h2>
            <p class="section-sub">覆盖国内外 12 家主流大模型厂商，点击查看完整产品线与定价</p>
          </div>
          <a href="#/providers" class="section-link">查看全部 →</a>
        </div>
        <div class="providers-grid">
          <div v-for="p in providerList.slice(0, 6)" :key="p.id" class="provider-card" @click="goHash('#/provider/' + p.id)">
            <div class="provider-card-head">
              <span class="provider-card-icon">
                <img :src="iconUrl(p.id)" :alt="p.name" @error="onIconError($event, p.id)">
              </span>
              <div>
                <div class="provider-card-name">{{ p.name }}</div>
                <div class="provider-card-region">{{ p.region === 'cn' ? '国内' : (p.region === 'us' ? '美国' : '欧洲') }}</div>
              </div>
            </div>
            <div class="provider-card-meta">
              <span>{{ p.productCount }} 个产品</span>
              <a :href="p.website" target="_blank" @click.stop>官网 ↗</a>
            </div>
            <div class="provider-card-status">
              <span class="status-dot" :class="p.statusOk ? 'ok' : 'fail'"></span>
              <span :style="{color: p.statusOk ? 'var(--green)' : 'var(--amber)'}">{{ p.statusOk ? '数据正常' : p.statusText }}</span>
            </div>
          </div>
        </div>
      </section>

      <!-- 价格预览 -->
      <section class="section" style="padding-top: 0;">
        <div class="section-head">
          <div>
            <div class="section-eyebrow">价格预览</div>
            <h2 class="section-title">最新<em>价格</em>一览</h2>
            <p class="section-sub">按模型发布时间倒序，展示最新上架的 8 款产品</p>
          </div>
          <a href="#/compare" class="section-link">完整对比 →</a>
        </div>
        <div class="freshness">
          <span>最近更新 <b>{{ freshnessText }}</b></span>
          <span class="freshness-sep">·</span>
          <span><b>{{ data.providers.length }}</b> 家厂商</span>
          <span class="freshness-sep">·</span>
          <span><b>{{ totalProducts }}</b> 个产品</span>
          <span class="stale-warning" v-if="staleCount > 0">{{ staleCount }} 家数据可能过期</span>
        </div>
        <div class="view-toggle">
          <div>
            <button :class="{active: view === 'table'}" @click="view = 'table'">表格</button>
            <button :class="{active: view === 'card'}" @click="view = 'card'">卡片</button>
          </div>
          <div class="currency-toggle">
            <button :class="{active: displayCurrency === 'CNY'}" @click="displayCurrency = 'CNY'">¥ CNY</button>
            <button :class="{active: displayCurrency === 'USD'}" @click="displayCurrency = 'USD'">$ USD</button>
          </div>
        </div>
        <div class="table-wrap" v-show="view === 'table'">
          <table class="price-table">
            <thead>
              <tr>
                <th>厂商</th>
                <th>模型</th>
                <th>计费</th>
                <th style="text-align:right">输入价</th>
                <th style="text-align:right">输出价</th>
                <th>购买</th>
              </tr>
            </thead>
            <tbody>
              <tr v-for="row in homePreviewRows" :key="row.id" @click="toggleExpand(row.id)"
                :class="{stale: row.stale, expanded: expanded === row.id}">
                <td>
                  <div class="provider-cell">
                    <span class="provider-icon">
                      <img :src="iconUrl(row.providerId)" :alt="row.providerName" @error="onIconError($event, row.providerId)">
                    </span>
                    {{ row.providerName }}
                  </div>
                </td>
                <td class="mono">{{ row.model || '—' }}</td>
                <td>{{ billingLabel(row.billing_type) }}</td>
                <td class="num">{{ formatPrice(row, 'input') }}</td>
                <td class="num">{{ formatPrice(row, 'output') }}</td>
                <td><a :href="row.purchase_url" target="_blank" @click.stop>购买</a></td>
              </tr>
            </tbody>
          </table>
        </div>
        <div class="card-grid" v-show="view === 'card'">
          <div v-for="row in homePreviewRows" :key="row.id" class="card" :class="{stale: row.stale}">
            <div class="card-header">
              <div class="card-provider-wrap">
                <span class="provider-icon">
                  <img :src="iconUrl(row.providerId)" :alt="row.providerName" @error="onIconError($event, row.providerId)">
                </span>
                <span class="card-provider">{{ row.providerName }}</span>
              </div>
              <span class="card-billing">{{ billingLabel(row.billing_type) }}</span>
            </div>
            <div class="card-model">{{ row.model || '—' }}</div>
            <div class="card-prices">
              <div v-if="row.prices.input"><span>输入</span><span>{{ formatPrice(row, 'input') }}</span></div>
              <div v-if="row.prices.output"><span>输出</span><span>{{ formatPrice(row, 'output') }}</span></div>
              <div v-if="row.prices.monthly_price"><span>月费</span><span>{{ formatPrice(row, 'monthly_price') }}</span></div>
            </div>
            <a class="card-buy" :href="row.purchase_url" target="_blank">购买 →</a>
          </div>
        </div>
      </section>
    </template>

    <!-- ============ 厂商总览 ============ -->
    <template v-if="data && routeName === 'providers'">
      <section class="section section-page">
        <div class="section-head">
          <div>
            <div class="section-eyebrow">全部厂商</div>
            <h1 class="section-title">厂商<em>总览</em></h1>
            <p class="section-sub">主流大模型厂商一览，点击卡片进入价格对比</p>
          </div>
        </div>
        <div class="freshness">
          <span>最近更新 <b>{{ freshnessText }}</b></span>
          <span class="freshness-sep">·</span>
          <span><b>{{ data.providers.length }}</b> 家厂商</span>
          <span class="stale-warning" v-if="staleCount > 0">{{ staleCount }} 家数据可能过期</span>
        </div>
        <div class="providers-grid">
          <div v-for="p in providerList" :key="p.id" class="provider-card" @click="goHash('#/provider/' + p.id)">
            <div class="provider-card-head">
              <span class="provider-card-icon">
                <img :src="iconUrl(p.id)" :alt="p.name" @error="onIconError($event, p.id)">
              </span>
              <div>
                <div class="provider-card-name">{{ p.name }}</div>
                <div class="provider-card-region">{{ p.region === 'cn' ? '国内' : (p.region === 'us' ? '美国' : '欧洲') }}</div>
              </div>
            </div>
            <div class="provider-card-meta">
              <span>{{ p.productCount }} 个产品</span>
              <a :href="p.website" target="_blank" @click.stop>官网 ↗</a>
            </div>
            <div class="provider-card-status">
              <span class="status-dot" :class="p.statusOk ? 'ok' : 'fail'"></span>
              <span :style="{color: p.statusOk ? 'var(--green)' : 'var(--amber)'}">{{ p.statusOk ? '数据正常' : p.statusText }}</span>
            </div>
          </div>
        </div>
      </section>
    </template>

    <!-- ============ 价格对比 / 计费类型页 / 厂商详情页 ============ -->
    <template v-if="data && (routeName === 'compare' || routeName === 'billing' || routeName === 'provider')">
      <section class="section section-page">
        <div class="section-head">
          <div>
            <div class="section-eyebrow" v-if="routeName === 'compare'">全部产品</div>
            <h1 class="section-title" v-if="routeName === 'compare'">价格<em>对比</em></h1>
            <p class="section-sub" v-if="routeName === 'compare'">所有厂商产品价格一览，支持筛选与排序</p>

            <div class="section-eyebrow" v-if="routeName === 'billing' && billingRoute === 'per_token'">Token 计费</div>
            <h1 class="section-title" v-if="routeName === 'billing' && billingRoute === 'per_token'">按需<em>计费</em></h1>
            <p class="section-sub" v-if="routeName === 'billing' && billingRoute === 'per_token'">按实际 Token 用量计费，适合低频或弹性调用</p>

            <div class="section-eyebrow" v-if="routeName === 'billing' && billingRoute === 'subscription'">周期订阅</div>
            <h1 class="section-title" v-if="routeName === 'billing' && billingRoute === 'subscription'">订阅<em>制</em></h1>
            <p class="section-sub" v-if="routeName === 'billing' && billingRoute === 'subscription'">月付或年付固定费用，适合高频稳定使用</p>

            <div class="section-eyebrow" v-if="routeName === 'billing' && billingRoute === 'coding_plan'">编程套餐</div>
            <h1 class="section-title" v-if="routeName === 'billing' && billingRoute === 'coding_plan'">Coding <em>Plan</em></h1>
            <p class="section-sub" v-if="routeName === 'billing' && billingRoute === 'coding_plan'">面向 AI 编程工具的套餐方案，支持 Claude Code、Cursor 等</p>

            <div class="section-eyebrow" v-if="routeName === 'provider' && currentProvider">厂商产品</div>
            <h1 class="section-title" v-if="routeName === 'provider' && currentProvider">{{ currentProvider.name }}<em> 全部产品</em></h1>
            <p class="section-sub" v-if="routeName === 'provider' && currentProvider">{{ currentProvider.name_en || currentProvider.name }} 的全部计费方式产品，含按需计费、订阅制与 Coding Plan</p>
          </div>
          <a v-if="routeName === 'provider'" href="#/providers" class="section-link">← 返回全部厂商</a>
        </div>

        <div class="filters">
          <div class="filter-group">
            <span class="filter-label">地区</span>
            <button v-for="r in regions" :key="r" @click="toggleFilter('region', r)"
              :class="['chip', {active: filters.region.includes(r)}]">{{ r === 'cn' ? '国内' : (r === 'us' ? '美国' : '欧洲') }}</button>
          </div>
          <div class="filter-group" v-if="routeName !== 'billing'">
            <span class="filter-label">计费</span>
            <button v-for="b in billingTypes" :key="b" @click="toggleFilter('billing', b)"
              :class="['chip', {active: filters.billing.includes(b)}]">{{ billingLabel(b) }}</button>
          </div>
          <div class="filter-group">
            <span class="filter-label">能力</span>
            <button v-for="m in modalities" :key="m" @click="toggleFilter('modality', m)"
              :class="['chip', {active: filters.modality.includes(m)}]">{{ m }}</button>
          </div>
        </div>

        <div class="freshness">
          <span>最近更新 <b>{{ freshnessText }}</b></span>
          <span class="freshness-sep">·</span>
          <span><b>{{ filteredRows.length }}</b> 个产品</span>
          <span class="stale-warning" v-if="staleCount > 0">{{ staleCount }} 家数据可能过期</span>
        </div>

        <div class="view-toggle">
          <div>
            <button :class="{active: view === 'table'}" @click="view = 'table'">表格</button>
            <button :class="{active: view === 'card'}" @click="view = 'card'">卡片</button>
          </div>
          <div class="currency-toggle">
            <button :class="{active: displayCurrency === 'CNY'}" @click="displayCurrency = 'CNY'">¥ CNY</button>
            <button :class="{active: displayCurrency === 'USD'}" @click="displayCurrency = 'USD'">$ USD</button>
          </div>
        </div>

        <div class="table-wrap" v-show="view === 'table'">
          <table class="price-table">
            <thead>
              <tr>
                <th class="sortable" @click="sortBy('providerName')" :class="{'sort-asc': sortKey === 'providerName' && sortAsc, 'sort-desc': sortKey === 'providerName' && !sortAsc}">厂商</th>
                <th class="sortable" @click="sortBy('model')" :class="{'sort-asc': sortKey === 'model' && sortAsc, 'sort-desc': sortKey === 'model' && !sortAsc}">模型</th>
                <th class="sortable" @click="sortBy('billing_type')" :class="{'sort-asc': sortKey === 'billing_type' && sortAsc, 'sort-desc': sortKey === 'billing_type' && !sortAsc}">计费</th>
                <th class="sortable" @click="sortBy('inputPrice')" :class="{'sort-asc': sortKey === 'inputPrice' && sortAsc, 'sort-desc': sortKey === 'inputPrice' && !sortAsc}" style="text-align:right">输入价</th>
                <th class="sortable" @click="sortBy('outputPrice')" :class="{'sort-asc': sortKey === 'outputPrice' && sortAsc, 'sort-desc': sortKey === 'outputPrice' && !sortAsc}" style="text-align:right">输出价</th>
                <th>购买</th>
              </tr>
            </thead>
            <tbody>
              <tr v-for="row in filteredRows" :key="row.id" @click="toggleExpand(row.id)"
                :class="{stale: row.stale, expanded: expanded === row.id}">
                <td>
                  <div class="provider-cell">
                    <span class="provider-icon">
                      <img :src="iconUrl(row.providerId)" :alt="row.providerName" @error="onIconError($event, row.providerId)">
                    </span>
                    {{ row.providerName }}
                  </div>
                </td>
                <td class="mono">{{ row.model || '—' }}</td>
                <td>{{ billingLabel(row.billing_type) }}</td>
                <td class="num">{{ formatPrice(row, 'input') }}</td>
                <td class="num">{{ formatPrice(row, 'output') }}</td>
                <td><a :href="row.purchase_url" target="_blank" @click.stop>购买</a></td>
              </tr>
              <tr v-if="expanded" class="detail-row">
                <td colspan="6">
                  <div class="detail">
                    <p>上下文窗口: {{ currentRow.context_window || '—' }}</p>
                    <p>能力: {{ (currentRow.modalities || []).join(', ') || '—' }}</p>
                    <p v-if="currentRow.notes">备注: {{ currentRow.notes }}</p>
                    <p v-if="currentRow.stale" class="stale-detail">数据来自 {{ staleHours(currentRow) }} 小时前，可能过期</p>
                  </div>
                </td>
              </tr>
            </tbody>
          </table>
        </div>

        <div class="card-grid" v-show="view === 'card'">
          <div v-for="row in filteredRows" :key="row.id" class="card" :class="{stale: row.stale}">
            <div class="card-header">
              <div class="card-provider-wrap">
                <span class="provider-icon">
                  <img :src="iconUrl(row.providerId)" :alt="row.providerName" @error="onIconError($event, row.providerId)">
                </span>
                <span class="card-provider">{{ row.providerName }}</span>
              </div>
              <span class="card-billing">{{ billingLabel(row.billing_type) }}</span>
            </div>
            <div class="card-model">{{ row.model || '—' }}</div>
            <div class="card-prices">
              <div v-if="row.prices.input"><span>输入</span><span>{{ formatPrice(row, 'input') }}</span></div>
              <div v-if="row.prices.output"><span>输出</span><span>{{ formatPrice(row, 'output') }}</span></div>
              <div v-if="row.prices.monthly_price"><span>月费</span><span>{{ formatPrice(row, 'monthly_price') }}</span></div>
            </div>
            <a class="card-buy" :href="row.purchase_url" target="_blank">购买 →</a>
          </div>
        </div>
      </section>
